<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Access denied</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #020617;
            color: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .box {
            text-align: center;
        }
        .muted {
            color: #9ca3af;
        }
        a {
            color: #22c55e;
        }
    </style>
</head>
<body>
<div class="box">
    <h1>403 – Dashboard access denied</h1>
    <p class="muted">This dashboard is only available to doctors and admin users.</p>
    <p><a href="/admin/login/">Login as a different user</a></p>
    <p><a href="/">Back to home</a></p>
</div>
</body>
</html>
